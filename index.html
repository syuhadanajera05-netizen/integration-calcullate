<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Integration Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjs@11.8.0/lib/browser/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 900px;
            padding: 25px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            color: #1a73e8;
            text-align: center;
        }
        .calculator-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media(min-width: 768px) {
            .calculator-layout {
                grid-template-columns: 350px 1fr;
            }
        }
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #1a73e8;
        }
        .bounds-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1557b0;
        }
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #e8f0fe;
            border-left: 5px solid #1a73e8;
            border-radius: 4px;
        }
        .result-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1a73e8;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .result-value {
            font-size: 22px;
            font-weight: bold;
            color: #111827;
        }
        .error-message {
            color: #dc2626;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        .graph-panel {
            position: relative;
            min-height: 350px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Definite Integration Calculator</h1>
    
    <div class="calculator-layout">
        <div class="control-panel">
            <div class="input-group">
                <label for="function-input">Function f(x)</label>
                <input type="text" id="function-input" value="x^2 - 2x + 1" placeholder="e.g., sin(x), x^3 - 2*x">
                <div id="error-box" class="error-message"></div>
            </div>
            
            <div class="bounds-group">
                <div class="input-group">
                    <label for="lower-bound">Lower Bound (a)</label>
                    <input type="number" id="lower-bound" value="0" step="any">
                </div>
                <div class="input-group">
                    <label for="upper-bound">Upper Bound (b)</label>
                    <input type="number" id="upper-bound" value="3" step="any">
                </div>
            </div>
            
            <button id="calculate-btn">Calculate & Plot</button>
            
            <div class="result-box">
                <div class="result-title">Definite Integral Value</div>
                <div id="result-display" class="result-value">0</div>
            </div>
        </div>
        
        <div class="graph-panel">
            <canvas id="graphCanvas"></canvas>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    // Numerical integration using Simpson's Rule
    function simpsonsRule(f, a, b, n = 1000) {
        if (n % 2 !== 0) n++; // n must be even
        const h = (b - a) / n;
        let sum = f(a) + f(b);

        for (let i = 1; i < n; i++) {
            const x = a + i * h;
            sum += i % 2 === 0 ? 2 * f(x) : 4 * f(x);
        }
        return (h / 3) * sum;
    }

    function calculateAndPlot() {
        const expressionInput = document.getElementById('function-input').value;
        const a = parseFloat(document.getElementById('lower-bound').value);
        const b = parseFloat(document.getElementById('upper-bound').value);
        const errorBox = document.getElementById('error-box');
        const resultDisplay = document.getElementById('result-display');
        
        errorBox.style.display = 'none';

        try {
            // Parse the user's expression using math.js
            const node = math.parse(expressionInput);
            const compiled = node.compile();
            
            // Wrapper function to evaluate safely
            const f = (xVal) => {
                const scope = { x: xVal };
                return compiled.evaluate(scope);
            };

            // 1. Calculate the Integral
            if (isNaN(a) || isNaN(b)) {
                throw new Error("Please enter valid numbers for bounds.");
            }
            const integralVal = simpsonsRule(f, a, b);
            resultDisplay.textContent = numericFormat(integralVal);

            // 2. Generate Data Points for Plotting
            // We expand the view slightly past the integration bounds for context
            const range = Math.abs(b - a) || 2; 
            const padding = range * 0.5; 
            const startX = Math.min(a, b) - padding;
            const endX = Math.max(a, b) + padding;
            
            const mainLineData = [];
            const shadedData = [];
            const steps = 200;
            const delta = (endX - startX) / steps;

            for (let i = 0; i <= steps; i++) {
                const currX = startX + i * delta;
                let currY = f(currX);
                
                // Handle edge cases like asymptotes yielding non-numbers
                if (typeof currY !== 'number' || isNaN(currY) || !isFinite(currY)) {
                    currY = null;
                }

                mainLineData.push({ x: currX, y: currY });

                // If x falls within [a, b], map it into the shaded area region
                if (currX >= Math.min(a,b) && currX <= Math.max(a,b)) {
                    shadedData.push({ x: currX, y: currY });
                }
            }

            updateGraph(mainLineData, shadedData, a, b);

        } catch (error) {
            errorBox.textContent = error.message.includes("Cannot parse") ? "Invalid equation syntax" : error.message;
            errorBox.style.display = 'block';
            resultDisplay.textContent = "Error";
        }
    }

    function numericFormat(val) {
        if (Math.abs(val) < 1e-4 && val !== 0) {
            return val.toExponential(4);
        }
        return Number(val.toFixed(5)).toString(); // Removes trailing zeros smoothly
    }

    function updateGraph(linePoints, filledPoints, a, b) {
        const ctx = document.getElementById('graphCanvas').getContext('2d');

        if (myChart) {
            myChart.destroy();
        }

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    {
                        label: 'f(x)',
                        data: linePoints,
                        borderColor: '#1a73e8',
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: false,
                        tension: 0.1
                    },
                    {
                        label: `Area from ${a} to ${b}`,
                        data: filledPoints,
                        backgroundColor: 'rgba(26, 115, 232, 0.25)',
                        borderColor: 'transparent',
                        pointRadius: 0,
                        fill: 'origin', // Fills down to the x-axis (y=0)
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear',
                        position: 'bottom',
                        grid: {
                            color: '#e2e8f0'
                        },
                        title: {
                            display: true,
                            text: 'x'
                        }
                    },
                    y: {
                        type: 'linear',
                        grid: {
                            color: '#e2e8f0'
                        },
                        title: {
                            display: true,
                            text: 'y'
                        }
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            filter: function(item) {
                                // Logic to omit showing a separate icon just for shaded area if preferred,
                                // but keeping it here informs user what the shaded space means.
                                return true; 
                            }
                        }
                    }
                }
            }
        });
    }

    // Attach Event Listeners
    document.getElementById('calculate-btn').addEventListener('click', calculateAndPlot);
    
    // Add real-time execution on pressing 'Enter' inside input fields
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateAndPlot();
            }
        });
    });

    // Initial load calculation
    window.onload = calculateAndPlot;
</script>

</body>
</html>
